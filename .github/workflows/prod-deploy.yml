name: CI/CD - Prod (AWS)

on:
  workflow_dispatch:
    inputs:
      branch: { description: 'Branch', required: true, default: 'develop' }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with: { ref: ${{ github.event.inputs.branch }} }
      - uses: actions/setup-java@v3
        with: { distribution: 'temurin', java-version: '17' }
      - uses: gradle/actions/setup-gradle@v3
        with: { gradle-version: '8.14.2' }

      - name: Generate Production Configs
        shell: bash
        run: |
          mkdir -p ./src/main/resources
          cat <<'EOF' > ./src/main/resources/application.yml
          ${{ secrets.CD_APPLICATION }}
          EOF
          cat <<'EOF' > ./src/main/resources/application-aws.yml
          ${{ secrets.CD_APPLICATION_AWS }}
          EOF
          cat <<'EOF' > ./src/main/resources/application-oauth.yml
          ${{ secrets.CD_APPLICATION_OAUTH }}
          EOF

      - name: Build & Push
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build --no-cache -t "${{ secrets.DOCKER_USERNAME }}/doki-prod:latest" .
          docker push "${{ secrets.DOCKER_USERNAME }}/doki-prod:latest"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Create SSH Key File
        run: |
          echo "${{ secrets.PROD_EC2_SSH_KEY }}" > prod_key.pem
          chmod 600 prod_key.pem

      - name: Deploy to AWS EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i prod_key.pem ubuntu@${{ secrets.PROD_EC2_PUBLIC_IP }} << EOF
            echo "📦 Pulling latest doki-prod image..."
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/doki-prod:latest

            echo "🗑 Cleaning up old containers..."
            sudo docker rm -f pawkey-dev-container pawkey-prod-container doki-prod-container || true

            echo "🚀 Running new production container..."
            sudo docker run -d -p 8080:8080 \
              --name doki-prod-container \
              --network doki-net \
              -e SPRING_PROFILES_ACTIVE=aws \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e DOKI_JWT_SECRET_VALUE="${{ secrets.DOKI_JWT_SECRET_VALUE }}" \
              -e DOKI_GOOGLE_CLIENT_ID="${{ secrets.DOKI_GOOGLE_CLIENT_ID }}" \
              -e DOKI_APPLE_CLIENT_ID="${{ secrets.DOKI_APPLE_CLIENT_ID }}" \
              -e DOKI_APPLE_TEAM_ID="${{ secrets.DOKI_APPLE_TEAM_ID }}" \
              -e DOKI_APPLE_KEY_ID="${{ secrets.DOKI_APPLE_KEY_ID }}" \
              -e DOKI_APPLE_REDIRECT_URI="${{ secrets.DOKI_APPLE_REDIRECT_URI }}" \
              -e APPLE_REFRESH_TOKEN_SECRET="${{ secrets.APPLE_REFRESH_TOKEN_SECRET }}" \
              -e DOKI_APPLE_PRIVATE_KEY='${{ secrets.DOKI_APPLE_PRIVATE_KEY }}' \
              -e DOKI_KAKAO_CLIENT_ID="${{ secrets.DOKI_KAKAO_CLIENT_ID }}" \
              -e DOKI_KAKAO_CLIENT_SECRET="${{ secrets.DOKI_KAKAO_CLIENT_SECRET }}" \
              -e DOKI_KAKAO_REDIRECT_URI="${{ secrets.DOKI_KAKAO_REDIRECT_URI }}" \
              -e WEATHER_URL="${{ secrets.WEATHER_URL }}" \
              -e WEATHER_API_KEY="${{ secrets.WEATHER_API_KEY }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              ${{ secrets.DOCKER_USERNAME }}/doki-prod:latest

            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ AWS Prod Deployment Complete!"
          EOF